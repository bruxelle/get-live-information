<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>myojou ライブ予定</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">myojou</p>
          <h1>ライブ予定</h1>
        </div>
        <p id="eventCount" class="event-count"></p>
      </header>

      <nav class="filters" aria-label="日付フィルター">
        <button class="filter-button is-active" type="button" data-filter="upcoming">今日以降</button>
        <button class="filter-button" type="button" data-filter="week">今週</button>
        <button class="filter-button" type="button" data-filter="month">今月</button>
        <button class="filter-button" type="button" data-filter="missing-deadline">締切未取得</button>
        <button class="filter-button" type="button" data-filter="all">すべて</button>
      </nav>

      <nav class="sort-controls" aria-label="並び替え">
        <button class="sort-button is-active" type="button" data-sort="event-date">ライブ日順</button>
        <button class="sort-button" type="button" data-sort="deadline">申込締切順</button>
      </nav>

      <nav class="view-switcher" aria-label="表示切り替え">
        <button class="view-button is-active" type="button" data-view="cards">カード</button>
        <button class="view-button" type="button" data-view="calendar">カレンダー</button>
      </nav>

      <section id="calendarView" class="calendar-view" hidden>
        <section class="deadline-alerts" aria-labelledby="deadlineAlertsHeading">
          <h2 id="deadlineAlertsHeading" class="deadline-alerts-heading">締切アラート</h2>
          <div id="deadlineAlertsList" class="deadline-alerts-list"></div>
          <p id="deadlineAlertsEmpty" class="deadline-alerts-empty" hidden>直近の締切アラートはありません。</p>
        </section>

        <nav class="calendar-mode-controls" aria-label="カレンダー表示モード">
          <button class="calendar-mode-button is-active" type="button" data-calendar-mode="live">ライブ日</button>
          <button class="calendar-mode-button" type="button" data-calendar-mode="application">申込締切</button>
          <button class="calendar-mode-button" type="button" data-calendar-mode="payment">支払期限</button>
          <button class="calendar-mode-button" type="button" data-calendar-mode="all">すべて</button>
        </nav>

        <button class="calendar-load-button" type="button" data-month-load="previous">前の月を表示</button>
        <div id="calendarMonths" class="calendar-months" aria-label="ライブ・締切カレンダー"></div>
        <button class="calendar-load-button" type="button" data-month-load="next">次の月を表示</button>
      </section>

      <section id="eventList" class="event-list" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" hidden>表示できる予定がありません。</p>
    </main>

    <script src="calendar_helpers.js"></script>
    <script src="app.js"></script>
  </body>
</html>
